      <path d="M 120,185 C 135,178 160,185 170,185 C 160,192 135,190 120,185 Z" fill="#dcd8c5"/>
      <path d="M 190,187 C 205,187 215,192 210,197 C 195,192 190,192 190,187 Z" fill="#dcd8c5"/>
    </g>
    <g class="flipper-front" style="transform-origin: 250px 290px; transform-box: view-box; animation: nr-flipperFlap 2s ease-in-out infinite alternate;">
